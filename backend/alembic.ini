# Alembic configuration for AltSpace.
#
# The sqlalchemy.url here is a placeholder — alembic/env.py overrides it at
# runtime from app.config.settings.DATABASE_URL so dev (SQLite) and prod
# (Postgres) use the same migrations with no edits to this file.

[alembic]
# path to migration scripts (relative to this file's directory)
script_location = alembic

# template used to generate migration file names; %%(rev)s + slug is readable
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone for file_template timestamps; omitted entirely = local time
# (an empty value is parsed as the ZoneInfo key "" and errors, so leave it out)

# max length of the slug field in file_template
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command regardless
# of autogenerate
revision_environment = false

# version path separator; os.pathsep on the host
version_path_separator = os

# placeholder, overridden by env.py from settings.DATABASE_URL
sqlalchemy.url = sqlite:///./altspace.db


[post_write_hooks]
# (no post-write hooks configured)


# ---- logging ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
